services:
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: portfolio_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - staticfiles:/vol/static
      - mediafiles:/vol/media
    depends_on:
      - web

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: portfolio_web
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - staticfiles:/app/staticfiles
      - mediafiles:/app/media
    depends_on:
      - db
      - redis
    # The port is no longer exposed to the host. Nginx handles that.
    # ports:
    #   - "8000:8000"

  db:
    image: postgres:16
    container_name: portfolio_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-portfolio_db}
      POSTGRES_USER: ${POSTGRES_USER:-portfolio_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Please set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: portfolio_redis
    restart: unless-stopped

volumes:
  postgres_data:
  staticfiles:
  mediafiles:
