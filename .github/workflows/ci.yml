name: CI/CD

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: portfolio_db
          POSTGRES_USER: portfolio_user
          POSTGRES_PASSWORD: portfolio_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio_user -d portfolio_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SECRET_KEY: ci-secret-key-please-replace-in-production-000000000000000000
      DJANGO_DEBUG: "False"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgresql://portfolio_user:portfolio_password@127.0.0.1:5432/portfolio_db
      DJANGO_CORS_ALLOWED_ORIGINS: http://localhost:5173
      DJANGO_CSRF_TRUSTED_ORIGINS: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt
      - name: Run checks
        run: |
          python backend/manage.py check --deploy
          python backend/manage.py test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Security audit
        run: npm run audit
        working-directory: frontend

  deploy:
    # This job runs only after the backend and frontend jobs have passed
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    # This job only runs on pushes to the main or master branch
    # It does not run on pull requests
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
