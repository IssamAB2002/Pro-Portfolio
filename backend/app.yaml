runtime: python312
env: standard
service: default

entrypoint: gunicorn -b :$PORT pro_portfolio.wsgi

env_variables:
  DJANGO_SETTINGS_MODULE: pro_portfolio.settings
  DJANGO_DEBUG: "False"
  DJANGO_LOG_LEVEL: "INFO"
  
  # ✅ FIXED: Changed from 'uc' to 'ew' region
  DJANGO_ALLOWED_HOSTS: "portfolio-487618.ew.r.appspot.com"
  
  # ✅ FIXED: Also changed CORS and CSRF to 'ew' region
  DJANGO_CORS_ALLOWED_ORIGINS: "https://portfolio-487618.ew.r.appspot.com"
  DJANGO_CSRF_TRUSTED_ORIGINS: "https://portfolio-487618.ew.r.appspot.com"
  
  DJANGO_SECURE_SSL_REDIRECT: "True"
  DJANGO_SECURE_HSTS_SECONDS: "31536000"
  DJANGO_SECURE_HSTS_INCLUDE_SUBDOMAINS: "True"
  DJANGO_SECURE_HSTS_PRELOAD: "True"
  
  DB_NAME: "portfolio-db"
  DB_USER: "postgres"
  DB_HOST: "/cloudsql/portfolio-487618:us-central1:portfolio-postgress-instance"
  DB_PORT: "5432"

automatic_scaling:
  min_instances: 1
  max_instances: 10

handlers:
  - url: /.*
    script: auto
    secure: always

beta_settings:
  cloud_sql_instances: portfolio-487618:us-central1:portfolio-postgress-instance